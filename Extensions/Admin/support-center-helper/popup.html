<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Center Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Support Center Helper</h1>
      <div class="version" id="version">v...</div>
    </div>
    
    <!-- Общая статистика -->
    <div class="stats-block">
      <div class="stat-item">
        <span class="stat-label">Всего тикетов на странице:</span>
        <span id="totalTickets" class="stat-value">0</span>
      </div>
    </div>
    
    <!-- Скрытие "Без темы" -->
    <div class="feature-block">
      <div class="feature-info">
        <h2>Скрыть тикеты без темы</h2>
        <div id="counterNoSubject" class="counter counter-loading">Загрузка...</div>
      </div>
      
      <label class="toggle-switch">
        <input type="checkbox" id="toggleNoSubject">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Скрытие архивированных -->
    <div class="feature-block">
      <div class="feature-info">
        <h2>Скрыть архивированные тикеты</h2>
        <div id="counterArchived" class="counter counter-loading">Загрузка...</div>
      </div>
      
      <label class="toggle-switch">
        <input type="checkbox" id="toggleArchived">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Навигация между тикетами -->
    <div class="feature-block">
      <div class="feature-info">
        <h2>Навигация внутри тикета</h2>
        <p class="feature-description">Добавляет кнопки для перехода к следующему и предыдущему тикету</p>
      </div>
      
      <label class="toggle-switch">
        <input type="checkbox" id="toggleNavigation">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Экспорт в CSV -->
    <div class="export-block">
      <button id="exportBtn" class="export-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>Скачать тикеты в CSV</span>
      </button>
      <button id="clearBtn" class="clear-btn">Очистить данные</button>
      <div id="exportInfo" class="export-info">Собрано: <span id="collectedCount">0</span> тикетов</div>
    </div>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
