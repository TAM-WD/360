<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Телемост Авто-Запись</title>
  <style>
    :root{
      --bg1:#667eea;
      --bg2:#764ba2;
      --card: rgba(255,255,255,.15);
      --text: rgba(255,255,255,.95);
      --muted: rgba(255,255,255,.75);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      max-width: 320px;
      padding: 30px 25px;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.4;

      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--text);
    }

    .header { text-align: center; margin-bottom: 25px; }
    .icon { font-size: 48px; margin-bottom: 10px; }
    .header h1 { font-size: 22px; margin-bottom: 8px; font-weight: 600; }
    .header .version { font-size: 12px; color: var(--muted); font-weight: 400; }

    .info-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .info-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: rgba(255,255,255,.92); }

    .info-item {
      font-size: 13px;
      line-height: 1.8;
      color: var(--text);
      padding-left: 18px;
      position: relative;
      margin-bottom: 8px;
    }
    .info-item::before {
      content: "•";
      position: absolute;
      left: 5px;
      font-weight: 700;
    }
    .info-item:last-child { margin-bottom: 0; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 20px;
      line-height: 1.5;
    }

    /* Если решишь добавить ссылку — стиль уже готов */
    .footer a { color: rgba(255,255,255,.95); text-decoration: underline; }
    .footer a:hover { color: #fff; }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon" aria-hidden="true">🎥</div>
    <h1>Телемост Авто-Запись</h1>
    <div class="version">версия 2.5</div>
  </div>

  <div class="info-card">
    <div class="info-title">📋 Как это работает:</div>
    <div class="info-item">Откройте встречу</div>
    <div class="info-item">При появлении 2 и более участников автоматически запустится запись на Яндекс Диск и конспектирование</div>
    <div class="info-item">Расширение работает в фоновом режиме</div>
  </div>

  <div class="footer">
    Для отладки откройте консоль (F12)<br />
    и следите за сообщениями [Телемост]
  </div>
</body>
</html>
